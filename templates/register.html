{% extends 'base.html' %}

{% block title %}Register - ShareJet{% endblock %}

{% block content %}
<div class="max-w-md mx-auto w-full mt-10">
    <div class="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 sm:p-12">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Create Account</h2>
            <p class="text-gray-500 mt-2">Join ShareJet to manage your file transfers securely.</p>
        </div>
        
        <form method="post" action="{% url 'register' %}" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:border-brand focus:ring-brand transition-colors" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address (Optional)</label>
                <input type="email" name="email" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:border-brand focus:ring-brand transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:border-brand focus:ring-brand transition-colors" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" name="password_confirm" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:border-brand focus:ring-brand transition-colors" required>
            </div>
            
            <button type="submit" class="w-full bg-brand text-white font-bold px-6 py-4 rounded-xl hover:bg-brand-dark transition-colors shadow-md mt-4">
                Sign Up
            </button>
        </form>
        
        <p class="text-center text-sm text-gray-500 mt-8">
            Already have an account? <a href="{% url 'login' %}" class="text-brand font-semibold hover:underline">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
